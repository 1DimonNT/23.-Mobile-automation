[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    android: Tests for Android platform
    ios: Tests for iOS platform
    local: Tests for local execution (emulator or real device)
    bstack: Tests for BrowserStack cloud execution
    onboarding: Tests for onboarding screens
    search: Tests for search functionality
    article: Tests for article viewing

addopts =
    -v
    --strict-markers
    --alluredir=allure-results
    --clean-alluredir
    -p no:warnings